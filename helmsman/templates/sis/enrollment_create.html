{% extends 'sis/detail_base.html' %}

{% block title %}Enroll Student {{ person.gumadinf.gum_adinf_pref_first_name|default:person.gum_ident_first_name }} {{ person.gum_ident_last_name }} - Helmsman{% endblock %}

{% block content %}
<div class="card">
    <h1>Create Section</h1>

    <form method="post">
        {% csrf_token %}
        <!-- RBID -->
        <div class="form-group">
            <label>RBID</label>
            <input type="text" value="{{ person.gum_ident_rbid }}" disabled
                   data-db-field="srh_sterm.srh_sterm_rbid | gum_ident.gum_ident_rbid">
        </div>

        <!-- Name -->
        <div class="form-group">
            <label>Name</label>
            <input type="text" value="{{ person.gumadinf.gum_adinf_pref_first_name|default:person.gum_ident_first_name }} {{ person.gum_ident_last_name }}" disabled
                   data-db-field="gum_ident.gum_ident_first_name | gum_ident.gum_ident_last_name">
        </div>

        <!-- Term -->
        <div class="form-group">
            <label>Term</label>
            <input type="text" value="{{ sterm.srh_sterm_tmid_id }} {{ sterm.srh_sterm_tmid.sgl_terms_hr_name }}" disabled
                   data-db-field="srh_sterm.srh_sterm_rbid | sgl_terms.sgl_terms_hr_name">
        </div>

        <!-- Select: Course -->
        <div class="form-group">
            <label for="section">Course</label>
            <select id="section" name="section"
            data-db-field="srh_enrol.srh_enrol_stid | srb_sects.srb_sects_stid | srl_cours.srl_cours_crid | srl_cours.srl_cours_hr_name">
                {% for sect in sects %}
                    <option value="{{ sect.srb_sects_stid }}">
                        {{ sect.srb_sects_crid.srl_cours_hr_name }}
                    </option>
                {% empty %}
                    <option value="NULL">-- No sections available --</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn">Save Changes</button>
        <a href="{% url 'sis:enrollment_create_term_select' person.gum_ident_rbid %}" class="btn btn-secondary">Change Term</a>
    </form>
</div>
{% endblock %}
