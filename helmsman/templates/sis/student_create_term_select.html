{% extends 'sis/detail_base.html' %}

{% block title %}Select term for {{ person.gumadinf.gum_adinf_pref_first_name|default:person.gum_ident_first_name }} {{ person.gum_ident_last_name }} {% endblock %}

{% block content %}
<div class="card">
    <h1>Create Student Record</h1>

    <form method="POST">
        {% csrf_token %}
        <!--   RBID -->
        <div class="form-group">
            <label>RBID</label>
            <input type="text" value="{{ person.gum_ident_rbid }}" disabled
                   data-db-field="srh_sterm.srh_sterm_rbid | gum_ident.gum_ident_rbid">
        </div>

        <!--   Name -->
        <div class="form-group">
            <label>First Name</label>
            <input type="text" value="{{ person.gumadinf.gum_adinf_pref_first_name|default:person.gum_ident_first_name }} {{ person.gum_ident_last_name }}" disabled
                   data-db-field="gum_ident.gum_ident_first_name | gum_ident.gum_ident_last_name">
        </div>

        <div class="form-group">
            <label for="terms-dropdown">Term</label>
            <select id="terms-dropdown" name="term"
                    data-db-field="gum_ident.srh_sterm.srh_sterm_tmid | sgl_terms.sgl_terms_tmid">
            {% for term in terms %}
                <option value="{{ term.sgl_terms_tmid }}">
                    {{ term.sgl_terms_hr_name }}
                </option>
            {% empty %}
                <option value="NULL">
                    No available term found.
                </option>
            {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">Create Record</button>
        <a href="{% url 'sis:student_create_person_select' %}" class="btn btn-secondary">Back to List</a>
    </form>
</div>
{% endblock %}
