{% extends 'sis/base.html' %}

{% block title %}Dashboard - Helmsman{% endblock %}

{% block content %}
<style>
    .dashboard-header {
        text-align: center;
        margin: 40px 0;
    }
    
    .dashboard-header h1 {
        font-size: 2.5em;
        color: #333;
        margin-bottom: 10px;
    }
    
    .subtitle {
        color: #666;
        font-size: 1.2em;
    }
    
    .dashboard-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
    }
    
    .dashboard-card {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        padding: 40px 30px;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s;
    }
    
    .dashboard-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border-color: #667eea;
    }
    
    .card-icon {
        font-size: 3em;
        margin-bottom: 20px;
    }
    
    .dashboard-card h2 {
        font-size: 1.5em;
        margin-bottom: 10px;
        color: #333;
    }
    
    .dashboard-card p {
        color: #666;
        font-size: 0.95em;
    }
    .search-wrap {
        position: relative;
        max-width: 480px;
        margin: 0 auto 2rem;
    }

    .search-input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 16px 10px 40px;
        font-size: 15px;
    }

    .search-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
    }

    .suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        z-index: 10;
        display: none;
    }

    .suggestion-item {
        display: flex;
        align-items: center;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
        color: inherit;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
        background: #f5f5f5;
    }
</style>

<div class="dashboard-header">
    <h1>Welcome to Helmsman</h1>
    <p class="subtitle">SIS Management Portal</p>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="dash-search" type="text"
         placeholder="Search or navigate..." autocomplete="off" />
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="dashboard-cards">
    {% for card in cards %}
    <a href="{{ card.url }}" class="dashboard-card" data-title="{{ card.title }}" data-desc="{{ card.desc }}">
        <div class="card-icon">{{ card.icon }}</div>
        <h2>{{ card.title }}</h2>
        <p>{{ card.desc }}</p>
    </a>
    {% endfor %}
</div>

<script>
const search = document.getElementById('dash-search');
const suggestions = document.getElementById('suggestions');
const cards = Array.from(document.querySelectorAll('.dashboard-card'));
let activeIdx = -1;



search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();

  suggestions.innerHTML = '';
  if (!q) { suggestions.style.display = 'none'; return; }
  const hits = cards.filter(c => c.dataset.title.toLowerCase().includes(q)).slice(0, 5);;
  hits.forEach(c => {
    const a = document.createElement('a');
    a.href = c.href;
    a.className = 'suggestion-item';
    a.textContent = c.dataset.title;
    suggestions.appendChild(a);
  });
  suggestions.style.display = hits.length ? 'block' : 'none';
  activeIdx = -1;
});

search.addEventListener('keydown', e => {
  const items = suggestions.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, -1); }
  else if (e.key === 'Enter' && items[activeIdx]) { window.location.href = items[activeIdx].href; return; }
  else if (e.key === 'Escape') { suggestions.style.display = 'none'; return; }
  items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
});

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== search)
    suggestions.style.display = 'none';
});
</script>
{% endblock %}
