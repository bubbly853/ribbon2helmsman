{% extends 'sis/detail_base.html' %}

{% block title %}{{ section.stid }} {{ section.name }} - Helmsman{% endblock %}

{% block content %}
<div class="card">
    <h1>Course Details</h1>

    <form method="post">
        {% csrf_token %}

        <!-- STID (Section ID) -->
        <div class="form-group">
            <label>STID</label>
            <input type="text" value="{{ section.stid }}" 
                   data-db-field="srb_sects.srb_sects_stid" disabled>
        </div>

        <!-- TMID (Term ID) -->
        <div class="form-group">
            <label>TMID</label>
            <input type="text" value="{{ section.tmid }}" 
                   data-db-field="srb_sects.srb_sects_tmid" disabled>
        </div>

        <!-- TMID (Term ID) -->
        <div class="form-group">
            <label>Sequence</label>
            <input type="text" value="{{ section.seq }}" 
                   data-db-field="srb_sects.srb_sects_section_seq" disabled>
        </div>

        <!-- CRID (Course ID) -->
        <div class="form-group">
            <label>RBID</label>
            <input type="text" value="{{ section.crid }}" 
                   data-db-field="srb_sects.srb_sects_crid | srl_cours.srl_cours_crid" disabled>
        </div>

        <!-- Course Name -->
        <div class="form-group">
            <label for="name">Course Name</label>
            <input type="text" id="name" name="name"
                   value="{{ section.name }}" disabled
                   data-db-field="srl_cours.srl_cours_hr_name">
        </div>

        <!-- Select: Prim Inst -->
        <div class="form-group">
            <label for="prim_inst">Primary Instructor</label>
            <select id="prim_inst" name="prim_inst"
            data-db-field="srb_sects.srv_sects_prim_inst | gum_ident.gum_ident_rbid | gum_ident.gum_ident_first_name | gum_ident.gum_ident_last_name">
                {% for person in persons %}
                    <option value="{{ person.gum_ident_rbid }}" 
                    {% if person.gum_ident_rbid == section.prim_rbid %}selected{% endif %}>
                        {{ person.gum_ident_first_name }} {{ person.gum_ident_last_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Select: scnd Inst -->
        <div class="form-group">
            <label for="scnd_inst">Secondary Instructor</label>
            <select id="scnd_inst" name="scnd_inst"
            data-db-field="srb_sects.srv_sects_scnd_inst | gum_ident.gum_ident_rbid | gum_ident.gum_ident_first_name | gum_ident.gum_ident_last_name">
                {% for person in persons %}
                    <option value="{{ person.gum_ident_rbid }}" 
                    {% if person.gum_ident_rbid == section.scnd_rbid %}selected{% endif %}>
                        {{ person.gum_ident_first_name }} {{ person.gum_ident_last_name }}
                    </option>
                {% endfor %}
                <option value="NULL" {% if not section.scnd_rbid %}selected{% endif %}></option>
            </select>
        </div>

        <button type="submit" class="btn">Save Changes</button>
        <a href="{% url 'sis:course_list' %}" class="btn btn-secondary">Back to List</a>
    </form>
</div>
{% endblock %}
